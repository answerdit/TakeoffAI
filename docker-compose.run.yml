# TakeoffAI — Runtime compose file
# Uses pre-built images loaded via: docker load -i takeoffai.tar.gz
# No source code or build context needed on the host.

services:
  backend:
    image: takeoffai-backend:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - takeoffai_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    image: takeoffai-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  takeoffai_data:
